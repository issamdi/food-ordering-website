<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results - Restaurant Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>

  <body>
    <div class="glass-edge-top"></div>
    <div class="glass-edge-bottom"></div>
    <div class="cursor-glow"></div>

    <nav class="navbar">
      <div class="nav-content">
        <a href="index.html" class="nav-logo" title="Go to Home Page">
          <img src="images/logo.png" alt="Restaurant Logo" />
        </a>

        <button
          class="mobile-menu-toggle"
          aria-controls="navbar-menu navbar-controls"
          aria-expanded="false"
          onclick="toggleMobileMenu()"
        >
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>

        <ul
          class="nav-links"
          id="navbar-menu"
          role="navigation"
          aria-hidden="true"
        >
          <li><a href="index.html" data-translate="home">Home</a></li>
          <li>
            <a href="categories.html" data-translate="categories">Categories</a>
          </li>
          <li><a href="foods.html" data-translate="food">Food</a></li>
          <li>
            <a href="cart.html"
              ><span data-translate="myOrders">My Orders</span>
              <span class="cart-counter">0</span></a
            >
          </li>
        </ul>

        <div class="nav-controls" id="navbar-controls">
          <select
            class="language-selector"
            onchange="changeLanguage(this.value)"
          >
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="ar">AR</option>
          </select>
          <button class="theme-toggle" onclick="toggleTheme()">
            <span class="icon">🌙</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-header">
      <h2>
        <span data-translate="searchResultsFor">Search Results for</span>
        <a href="#" id="search-query-display">""</a>
      </h2>
    </div>

    <!-- Search Again -->
    <section class="section" style="padding-top: 0">
      <div class="container">
        <form
          action="food-search.html"
          method="GET"
          class="hero-search-form"
          style="max-width: 600px; margin: 0 auto"
        >
          <input
            type="search"
            name="search"
            id="search-input"
            data-translate-placeholder="search"
            placeholder="Search for Food.."
            required
          />
          <button
            type="submit"
            class="btn btn-primary"
            data-translate="searchBtn"
          >
            Search
          </button>
        </form>
      </div>
    </section>

    <!-- Search Results (rendered by JS) -->
    <section class="section">
      <div class="container">
        <div class="food-grid stagger-reveal" id="search-results"></div>
        <p
          class="text-center"
          id="no-results"
          style="display: none"
          data-translate="noResults"
        >
          No food items found. Try a different search term.
        </p>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">
        <div class="footer-links">
          <a href="javascript:void(0)" title="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="javascript:void(0)" title="WhatsApp"
            ><i class="fab fa-whatsapp"></i
          ></a>
          <a href="javascript:void(0)" title="Email"
            ><i class="fas fa-envelope"></i
          ></a>
          <a href="javascript:void(0)" title="Phone"
            ><i class="fas fa-phone"></i
          ></a>
        </div>
        <p>
          All rights reserved. Designed By
          <a
            href="https://issamdaoudi.site"
            target="_blank"
            rel="noopener noreferrer"
            >ID</a
          >
        </p>
      </div>
    </footer>

    <button class="scroll-top-btn" aria-label="Scroll to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/script.js"></script>
  </body>
</html>
