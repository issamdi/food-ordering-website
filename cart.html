<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders - Restaurant Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>

  <body>
    <div class="glass-edge-top"></div>
    <div class="glass-edge-bottom"></div>
    <div class="cursor-glow"></div>

    <nav class="navbar">
      <div class="nav-content">
        <a href="index.html" class="nav-logo" title="Go to Home Page">
          <img src="images/logo.png" alt="Restaurant Logo" />
        </a>

        <button
          class="mobile-menu-toggle"
          aria-controls="navbar-menu navbar-controls"
          aria-expanded="false"
          onclick="toggleMobileMenu()"
        >
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>

        <ul
          class="nav-links"
          id="navbar-menu"
          role="navigation"
          aria-hidden="true"
        >
          <li><a href="index.html" data-translate="home">Home</a></li>
          <li>
            <a href="categories.html" data-translate="categories">Categories</a>
          </li>
          <li><a href="foods.html" data-translate="food">Food</a></li>
          <li>
            <a href="cart.html" class="active"
              ><span data-translate="myOrders">My Orders</span>
              <span class="cart-counter">0</span></a
            >
          </li>
        </ul>

        <div class="nav-controls" id="navbar-controls">
          <select
            class="language-selector"
            onchange="changeLanguage(this.value)"
          >
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="ar">AR</option>
          </select>
          <button class="theme-toggle" onclick="toggleTheme()">
            <span class="icon">🌙</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- My Orders Section -->
    <section class="cart-section">
      <div class="container">
        <h2 class="section-title" data-translate="myOrdersTitle">My Orders</h2>

        <div class="cart-container">
          <div id="cart-items">
            <!-- Order items will be loaded here by JavaScript -->
          </div>

          <div class="cart-summary">
            <div class="summary-box">
              <h3 data-translate="orderSummary">Order Summary</h3>
              <div class="summary-row">
                <span data-translate="subtotal">Subtotal:</span>
                <span id="cart-subtotal">$0.00</span>
              </div>
              <div class="summary-row">
                <span data-translate="deliveryFee">Delivery Fee:</span>
                <span id="delivery-fee">$3.99</span>
              </div>
              <div class="summary-row">
                <span data-translate="tax">Tax (8%):</span>
                <span id="cart-tax">$0.00</span>
              </div>
              <div class="summary-row total">
                <span data-translate="total">Total:</span>
                <span id="cart-total">$3.99</span>
              </div>

              <div class="cart-actions">
                <button
                  class="btn btn-secondary"
                  onclick="clearCart()"
                  data-translate="clearOrders"
                >
                  Clear Orders
                </button>
                <button
                  class="btn btn-primary"
                  onclick="proceedToCheckout()"
                  data-translate="proceedToCheckout"
                >
                  Proceed to Checkout
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="empty-cart" class="empty-cart" style="display: none">
          <div class="empty-cart-content">
            <h3 data-translate="emptyOrderTitle">Your order is empty</h3>
            <p data-translate="emptyOrderText">
              Add some delicious food items to your order to get started!
            </p>
            <a
              href="foods.html"
              class="btn btn-primary"
              data-translate="browseFood"
              >Browse Food</a
            >
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">
        <div class="footer-links">
          <a href="javascript:void(0)" title="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="javascript:void(0)" title="WhatsApp"
            ><i class="fab fa-whatsapp"></i
          ></a>
          <a href="javascript:void(0)" title="Email"
            ><i class="fas fa-envelope"></i
          ></a>
          <a href="javascript:void(0)" title="Phone"
            ><i class="fas fa-phone"></i
          ></a>
        </div>
        <p>
          All rights reserved. Designed By
          <a
            href="https://issamdaoudi.site"
            target="_blank"
            rel="noopener noreferrer"
            >ID</a
          >
        </p>
      </div>
    </footer>

    <button class="scroll-top-btn" aria-label="Scroll to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
