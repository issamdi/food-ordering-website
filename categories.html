<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories - Restaurant Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>

  <body>
    <div class="glass-edge-top"></div>
    <div class="glass-edge-bottom"></div>
    <div class="cursor-glow"></div>

    <nav class="navbar">
      <div class="nav-content">
        <a href="index.html" class="nav-logo" title="Go to Home Page">
          <img src="images/logo.png" alt="Restaurant Logo" />
        </a>

        <button
          class="mobile-menu-toggle"
          aria-controls="navbar-menu navbar-controls"
          aria-expanded="false"
          onclick="toggleMobileMenu()"
        >
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>

        <ul
          class="nav-links"
          id="navbar-menu"
          role="navigation"
          aria-hidden="true"
        >
          <li><a href="index.html" data-translate="home">Home</a></li>
          <li>
            <a href="categories.html" class="active" data-translate="categories"
              >Categories</a
            >
          </li>
          <li><a href="foods.html" data-translate="food">Food</a></li>
          <li>
            <a href="cart.html"
              ><span data-translate="myOrders">My Orders</span>
              <span class="cart-counter">0</span></a
            >
          </li>
        </ul>

        <div class="nav-controls" id="navbar-controls">
          <select
            class="language-selector"
            onchange="changeLanguage(this.value)"
          >
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="ar">AR</option>
          </select>
          <button class="theme-toggle" onclick="toggleTheme()">
            <span class="icon">🌙</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
      <h2 data-translate="categoriesTitle">Explore Food</h2>
    </div>

    <!-- Search -->
    <section class="section" style="padding-top: 0">
      <div class="container">
        <form
          action="food-search.html"
          method="GET"
          class="hero-search-form"
          style="max-width: 600px; margin: 0 auto"
        >
          <input
            type="search"
            name="search"
            data-translate-placeholder="search"
            placeholder="Search for Food.."
            required
          />
          <button
            type="submit"
            class="btn btn-primary"
            data-translate="searchBtn"
          >
            Search
          </button>
        </form>
      </div>
    </section>

    <!-- Categories Grid -->
    <section class="section">
      <div class="container">
        <div class="categories-grid stagger-reveal">
          <a href="category-foods.html?category=pizza" class="category-card">
            <img src="images/pizza.jpg" alt="Pizza" class="category-card-img" />
            <span class="category-badge" data-translate="badgeNew">New</span>
            <div class="category-card-overlay">
              <h3 data-translate="pizza">Pizza</h3>
            </div>
          </a>

          <a href="category-foods.html?category=burger" class="category-card">
            <img
              src="images/burger.jpg"
              alt="Burger"
              class="category-card-img"
            />
            <span class="category-badge" data-translate="badgePopular"
              >Popular</span
            >
            <div class="category-card-overlay">
              <h3 data-translate="burger">Burger</h3>
            </div>
          </a>

          <a href="category-foods.html?category=momo" class="category-card">
            <img src="images/momo.jpg" alt="Momo" class="category-card-img" />
            <span class="category-badge" data-translate="badgeHot">Hot</span>
            <div class="category-card-overlay">
              <h3 data-translate="momo">Momo</h3>
            </div>
          </a>

          <a
            href="category-foods.html?category=grilled-chicken"
            class="category-card"
          >
            <img
              src="images/crilled-chicken-bread-piece-greens-pepper-sauce-spices-side-view.jpg"
              alt="Grilled Chicken"
              class="category-card-img"
            />
            <span class="category-badge" data-translate="badgeChefsPick"
              >Chef's Pick</span
            >
            <div class="category-card-overlay">
              <h3 data-translate="grilledChicken">Grilled Chicken</h3>
            </div>
          </a>

          <a href="category-foods.html?category=wraps" class="category-card">
            <img
              src="images/lavash-rolls-top-view-table.jpg"
              alt="Wraps"
              class="category-card-img"
            />
            <span class="category-badge" data-translate="badgeTrending"
              >Trending</span
            >
            <div class="category-card-overlay">
              <h3 data-translate="wraps">Wraps</h3>
            </div>
          </a>

          <a href="category-foods.html?category=bowls" class="category-card">
            <img
              src="images/colorful-bowl-of-deliciousness-with-fried-egg-RaPUELLHgqFnS9zI85BpU.webp"
              alt="Bowls"
              class="category-card-img"
            />
            <span class="category-badge" data-translate="badgeHealthy"
              >Healthy</span
            >
            <div class="category-card-overlay">
              <h3 data-translate="bowls">Bowls</h3>
            </div>
          </a>

          <a href="category-foods.html?category=patties" class="category-card">
            <img
              src="images/potato-patties-topped-with-beef-patties-shoe-strings.jpg"
              alt="Patties"
              class="category-card-img"
            />
            <span class="category-badge" data-translate="badgeClassic"
              >Classic</span
            >
            <div class="category-card-overlay">
              <h3 data-translate="patties">Patties</h3>
            </div>
          </a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container text-center">
        <div class="footer-links">
          <a href="javascript:void(0)" title="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="javascript:void(0)" title="WhatsApp"
            ><i class="fab fa-whatsapp"></i
          ></a>
          <a href="javascript:void(0)" title="Email"
            ><i class="fas fa-envelope"></i
          ></a>
          <a href="javascript:void(0)" title="Phone"
            ><i class="fas fa-phone"></i
          ></a>
        </div>
        <p>
          All rights reserved. Designed By
          <a
            href="https://issamdaoudi.site"
            target="_blank"
            rel="noopener noreferrer"
            >ID</a
          >
        </p>
      </div>
    </footer>

    <button class="scroll-top-btn" aria-label="Scroll to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/script.js"></script>
  </body>
</html>
